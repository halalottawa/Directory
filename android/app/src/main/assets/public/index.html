es a wide selection of grilled dishes such as shish taouk, kafta, lamb chops, shawarma, and mixed grill platters, all cooked over real charcoal for a distinctive smoky flavour.\n\nAlongside the grills, the restaurant offers a variety of mezze and appetizers, including hummus, tabbouleh, baba ghanouj, and stuffed grape leaves, as well as soups and salads.\n\nLes Grillades also serves Lebanese breakfast options, desserts like baklava and knafeh, and large family platters designed for sharing. The restaurant provides dine-in, takeout, delivery, and catering services for events and gatherings, with options such as whole roasted lamb or chicken for special occasions.\n\nWith its focus on charcoal grilling, traditional recipes, and a wide variety of Lebanese dishes, Les Grillades offers a complete Middle Eastern dining experience in Ottawa.","socialMediaLinks":[""],"slug":"les-grillades","isApproved":true,"menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"types":["Breakfast","Brunch","Shawarma","Seafood"]},{"id":"5YdkqVnUEoLA3JatBZhg","phoneNumber":"613-695-7437","category":["Restaurants","Bakery"],"lng":0,"plan":"basic","isFeatured":false,"address":"288 Bank St, Ottawa, ON K2P 1X7","averageRating":0,"socialMediaLinks":[""],"description":"Sindbad Bakery is an establishment in Ottawa specializing in authentic Middle Eastern pastries, fresh breads, and a variety of desserts. It aims to offer a genuine taste of the Levant and Mediterranean regions, combining traditional recipes with quality ingredients.\n\nThe bakery's offerings include classic Middle Eastern sweets such as baklava, basbousa, maamoul, and kunafa, prepared with rich nuts, ghee, and a balanced sweetness. Customers can also find freshly baked pita bread and manakish. Savory options are a significant part of their menu, featuring meat pies, Zatar pies, cheese pies, chicken pies, and meat and cheese pies.\n\nTheir savory pies are often filled with seasoned meat or topped with a blend of zaatar, cheese, or spiced meat. The menu also highlights items like 'Zatar & Cheese' and 'Zatar & Vegi' pies, along with 'Sujuk (sausage) and Cheese' pies. They offer sweet dessert pastries such as 'Viral Dubai Kunafa Dessert' featuring melted cheese, crispy kunafa, pistachio sauce, and crumbs.","suburb":"Centretown","types":["Bakery","Desserts"],"menuItems":[{"items":[{"description":"","price":"","name":""}],"category":""}],"isApproved":true,"slug":"sindbad-pies","lat":0,"reviewCount":0,"website":"https://sindbadpies.com","email":"info@sindbadpies.com","menuPdfUrl":"","name":"Sindbad Pies","openingHours":"","cuisine":["Middle Eastern","Mediterranean"],"updatedAt":"2026-05-23T16:04:25.077Z","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/sindbad-pies.webp"],"createdAt":"2026-05-15T02:02:32.984Z"},{"id":"5u4p9Ipee6OHAIUH1jp1","createdAt":"2026-03-26T14:37:01.657Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/misk-boutique.webp"],"submittedBy":"TlnotBahl2WlhBon7hvn0puRW193","cuisine":[],"openingHours":"","updatedAt":"2026-05-23T16:51:27.452Z","name":"Misk Boutique","menuPdfUrl":"","reviewCount":0,"email":"info@miskboutique.ca","website":"https://miskboutique.ca","photo":"https://lh3.googleusercontent.com/gps-cs-s/AHVAwepwM5h3uKpTWg3fhEKSWaUuxd1I3x0nSfqGTb2jDTqd1dVhgONKQkMKKu1Hn9LG9_-2Deq52haFBirFDYp1Tp4WyPR82Ib6Ae7QFKwyKKXzkJGhvjGbZ-0BkcMfTr1bonMXuXvCY--U5ojl","lat":45.4215,"slug":"misk-boutique","isApproved":true,"menuItems":[{"items":[{"price":"","description":"","name":""}],"category":""}],"types":[],"suburb":"","description":"Misk Boutique in Kanata is a modern fashion boutique specializing in elegant modest wear for women.\n\nLocated in Kanata Central, the boutique offers a thoughtfully curated selection of clothing, hijabs, scarves, abayas, dresses, and everyday essentials designed to blend style, comfort, and modesty.\n\nWhether you’re shopping for casual outfits, professional attire, or special occasion wear, Misk Boutique provides high-quality fabrics and chic designs that cater to every woman’s unique style.\n\nTheir collection features both timeless staples and trendy new arrivals, ensuring there’s something for every season.\n\nShoppers enjoy a welcoming atmosphere, excellent customer service, and the convenience of free plaza parking.\n\nMisk Boutique also offers online shopping through its website, making it easy to browse and order from the comfort of home.","socialMediaLinks":[""],"averageRating":0,"address":"471 Terry Fox Dr Unit 80, Ottawa, ON K2T 0B9","isFeatured":false,"category":["Clothing"],"lng":-75.6972,"plan":"basic","phoneNumber":"613-271-7222"},{"id":"6uylcwB3uED1LG4ddJo7","types":["Steakhouse"],"isApproved":true,"menuItems":[{"items":[{"description":"","price":"","name":""}],"category":""}],"slug":"african-bbq-house","socialMediaLinks":[""],"description":"African BBQ House offers a culinary experience featuring authentic African BBQ. The establishment provides a vibrant and flavorful dining experience with dishes that highlight traditional African cooking methods and spices. It aims to deliver a true taste of Africa through its diverse offerings. \n\nThe menu at African BBQ House showcases a variety of charcoal-grilled options, including full, half, and quarter chicken plates. Guests can also enjoy succulent skewers of beef, lamb, goat, shrimp, and fish. Popular meal combinations often come served with flavorful jollof rice, a refreshing chef salad, and a choice of crispy fries or golden fried plantains. \n\nBeyond the main protein selections, the establishment offers a range of side dishes such as sweet potato fries, potato wedges, and mixed vegetables. Specialties include family meals, designed for sharing, which feature a whole chicken or a selection of six meat skewers with accompanying sides. The culinary approach focuses on rich, diverse flavors and traditional charcoal grilling techniques to ensure an authentic taste.","suburb":"Orléans","address":"385 Tompkins Ave, Ottawa, ON K1E 3J5","averageRating":0,"phoneNumber":"613-830-9494","plan":"basic","lng":0,"category":["Restaurants"],"isFeatured":false,"photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/african-bbq-house.webp"],"createdAt":"2026-04-17T18:39:58.135Z","name":"African BBQ House","updatedAt":"2026-06-06T03:17:09.816Z","openingHours":"","cuisine":[],"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","website":"https://africanbbqhouse.ca","email":"info@africanbbqhouse.ca","reviewCount":0,"menuPdfUrl":"","lat":0,"photo":"/uploads/african-bbq-house-photo.webp"},{"id":"6zsxm0z4ynuCfZyBCyWX","lat":0,"menuPdfUrl":"","website":"https://sabad-modest-wear.business.site","email":"info@sabad.ca","reviewCount":0,"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-05-23T15:27:30.185Z","cuisine":[],"openingHours":"","name":"Sabad Modest Wear","createdAt":"2026-05-16T10:10:00.568Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/sabad-modest-wear.webp"],"isFeatured":false,"plan":"basic","category":["Clothing"],"lng":0,"phoneNumber":"613-747-8338","averageRating":0,"address":"1200 St. Laurent Blvd, Ottawa, ON K1K 3B8","suburb":"Rideau-Rockcliffe","description":"Sabad Modest Wear is a contemporary fashion brand dedicated to offering stylish, high-quality, and comfortable clothing for women who seek modesty without compromising on elegance. The brand's collections seamlessly blend modern trends with timeless modest fashion principles, providing versatile pieces suitable for various occasions, from everyday wear to professional settings and special events.\n\nEach item from Sabad Modest Wear is meticulously crafted using premium fabrics to ensure durability, comfort, and effortless style. Their product range includes chic abayas, modest dresses, versatile tops, skirts, and hijabs, all designed to celebrate individuality while honoring cultural and personal values. The brand also offers a selection of accessories to complement their apparel.\n\nFounded with a vision to redefine modest fashion, Sabad Modest Wear aims to empower and inspire women. They embrace inclusivity by providing a wide selection of sizes, cuts, and colors to suit diverse preferences, backgrounds, and body types. The brand emphasizes quality and consciousness, with a commitment to mindfulness and respect in their sourcing and collaboration practices.","socialMediaLinks":[""],"slug":"sabad-modest-wear","isApproved":true,"menuItems":[{"items":[{"description":"","price":"","name":""}],"category":""}],"types":[]},{"id":"7PdYLAfSDIczKAS7xVSv","lng":0,"category":["Grocery","Butchers"],"plan":"basic","phoneNumber":"613-745-8123","isFeatured":false,"address":"300 McArthur Ave, Ottawa, ON K1L 6P2","averageRating":0,"socialMediaLinks":[""],"suburb":"Vanier","description":"Moussa Market & Meat Shop, established in 2008, is a notable destination in Vanier, Ottawa. The market is recognized for its extensive selection of authentic Middle Eastern grocery items and fresh halal meats. Founded by Issam and his brother, it has evolved from initially specializing in Lebanese imports to offering a broader array of products.\n\nThe market provides a diverse range of products sourced from across the Middle East, featuring specialties from countries such as Syria, Turkey, Palestine, Jordan, and Egypt. Customers can find high-quality fresh meats, including beef, lamb, and chicken, alongside a wide variety of traditional grocery staples. These offerings encompass numerous spices, grains, canned goods, and an assortment of sweets.\n\nAs a family-run establishment, Moussa Market & Meat Shop is a trusted source for genuine ingredients and specialty products. It caters to the diverse culinary needs of the community by supplying pantry essentials and unique items, making it a reliable destination for those seeking authentic Middle Eastern food products and halal meats.","isApproved":true,"menuItems":[{"items":[{"price":"","description":"","name":""}],"category":""}],"types":[],"slug":"moussa-market-meat-shop","lat":0,"reviewCount":0,"email":"mcarthurfoods@gmail.com","website":"https://www.facebook.com/p/Moussa-Market-100057486757799/","menuPdfUrl":"","name":"Moussa Market & Meat Shop","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","openingHours":"","cuisine":[],"updatedAt":"2026-05-23T15:58:46.993Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/moussa-market-meat-shop.webp"],"createdAt":"2026-05-15T02:07:22.547Z"},{"id":"7gHX8OrZO9xyjDKI12Ay","suburb":"","description":"Saigon Bistro is a Vietnamese restaurant located in the Ottawa area, specifically in Orléans. It is known for offering fresh, delicious, and Halal Vietnamese cuisine. The establishment aims to provide a dining experience that respects Halal values while celebrating the vibrant flavors of Vietnamese cooking.\n\nThe menu at Saigon Bistro features a variety of authentic Vietnamese dishes, including slow-simmered pho, freshly rolled spring rolls, and banh mi. Popular items include the SB Mix, Grilled Beef with Spring Roll, and Grilled Chicken with Spring Roll. Other offerings range from crispy chicken spring rolls to shrimp summer rolls, along with various pho options such as Shrimp Pho.\n\nDiners can also find rice vermicelli noodle bowls topped with fresh herbs, vegetables, and a choice of protein, served with house-special fish sauce. The restaurant prepares dishes like crispy egg noodles with beef, chicken, or tofu sautéed with seasoned vegetables. Additionally, the menu includes rice dishes, special pho variations, and a selection of appetizers and beverages, including Vietnamese coffee.","socialMediaLinks":[""],"slug":"saigon-bistro","menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"isApproved":true,"types":["Pho"],"isFeatured":false,"plan":"basic","category":["Restaurants"],"lng":0,"phoneNumber":"613-834-5237","averageRating":0,"address":"2136 Saint Joseph Boulevard, Ottawa, ON K1C 1E7","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-06-06T03:20:24.803Z","openingHours":"","cuisine":[],"name":"Saigon Bistro","createdAt":"2026-04-16T19:58:15.454Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/saigon-bistro.webp"],"photo":"/uploads/saigon-bistro-photo.webp","lat":0,"menuPdfUrl":"","email":"saigonbistro.orleans@gmail.com","website":"https://www.saigonbistro.ca","reviewCount":0},{"id":"7l9hZ9A5sGqHDaH0xKaZ","plan":"basic","lng":0,"category":["Mosques","Organizations"],"phoneNumber":"613-596-3393","isFeatured":false,"address":"3049 Carling Ave, Ottawa, ON K2B 7K2","averageRating":0,"socialMediaLinks":[""],"suburb":"Fairfield Heights","description":"Abu Bakr Musalla, also known as Bayshore Musalla, is a community mosque located in Ottawa. It serves as a vital spiritual space for Muslims in the Bayshore area, offering a clean, accessible, and secure environment for daily congregational prayers.\n\nThe musalla was established as a temporary space following the closure of Dar Al-Arkam Musallah and operates within a City of Ottawa facility. It provides a calm, respectful, and inclusive environment for individuals seeking a quiet place for daily worship. Services offered include Nikah Services and Muslim Matrimonial Services.\n\nWhile it provides a dependable spiritual stop for daily prayer-goers, it currently lacks a full-service mosque infrastructure, such as Jumu'ah (Friday prayer) or a dedicated women's section at certain listed locations.","isApproved":true,"menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"types":[],"slug":"bayshore-musalla","lat":0,"website":"https://www.abubakrmusalla.ca","email":"bayshoremasjid@gmail.com","reviewCount":0,"menuPdfUrl":"","name":"Abu Bakr Musalla","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-05-23T15:35:30.599Z","openingHours":"","cuisine":[],"photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/bayshore-musalla.webp"],"createdAt":"2026-05-15T15:26:21.157Z"},{"id":"7sQ5Pm0hNpqv1vWkAhxg","address":"4509 Innes Rd, Orléans, ON K4A 3J7","averageRating":0,"plan":"basic","lng":-75.494,"category":["Mosques"],"phoneNumber":"(613) 841-0786","isFeatured":false,"isApproved":true,"menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"types":[],"slug":"masjid-bilal","socialMediaLinks":[""],"suburb":"Orléans","description":"Masjid Bilal is the official mosque of the Islamic Society of Cumberland, a registered charitable organization established in 1993 by Muslims living in the Orleans area of Ottawa.\n\nInitially set up as a temporary Musallah in a residential home, the mosque grew alongside the local Muslim population.\n\nIn 2004, ISC began planning the construction of a new facility to better serve the community’s spiritual and educational needs. Construction started in 2008, and by July 2011, the new Masjid opened its doors.\n\nToday, Masjid Bilal accommodates up to 700 worshippers, offering five daily prayers, Jumu’ah, Taraweeh, and Eid services, as well as Islamic classes for youth, an Islamic library, funeral services, and community events.","email":"info@masjidbilal.org","website":"https://www.masjidbilal.org/","reviewCount":0,"menuPdfUrl":"","photo":"/uploads/masjid-bilal-photo.webp","lat":45.441,"photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/masjid-bilal.webp"],"createdAt":"2026-03-24T00:12:49.618Z","name":"Masjid Bilal","submittedBy":"TlnotBahl2WlhBon7hvn0puRW193","updatedAt":"2026-06-06T09:32:16.164Z","openingHours":"","cuisine":[]},{"id":"8UmmSKQajCnBxF9oC6ch","address":"3023 Cedarview Road, Ottawa, ON K2J 5W3","averageRating":0,"lng":0,"category":["Grocery","Butchers"],"plan":"basic","phoneNumber":"(613) 843-8880","isFeatured":false,"isApproved":true,"menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"types":[],"slug":"aladdin-grocery-meat-shop","socialMediaLinks":[""],"suburb":"Nepean","description":"Aladdin Grocery & Meat Shop serves the community as a local grocer offering a wide array of international products and quality meats. It operates as a full-service halal butcher shop, providing fresh ingredients to its customers.\n\nThe establishment is known for its selection of high-quality, fresh halal meats, including beef, lamb, goat, and chicken, sourced from reputable farms such as Harris Ranch Halal division and Islamic House of Meat and Poultry (IMP). Skilled butchers are on staff to ensure customer satisfaction. The store also features a produce market specializing in unique and hard-to-find items.\n\nIn addition to fresh meat and produce, Aladdin Grocery & Meat Shop carries extensive lines of imported groceries, noted for their quality and competitive pricing. A bakery section offers specialty Lebanese favorite goods, including meat, cheese, and thyme pies. The store also includes a deli department that provides convenient to-go food options.","reviewCount":0,"email":"","website":"https://aladdingourmet.ca","menuPdfUrl":"","photo":"/uploads/aladdin-grocery-meat-shop-photo.webp","lat":0,"photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/aladdin-grocery-meat-shop-photo.webp"],"createdAt":"2026-04-18T13:16:17.652Z","name":"Aladdin Grocery & Meat Shop","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","openingHours":"","cuisine":[],"updatedAt":"2026-06-06T13:17:24.989Z"},{"id":"8iFVVFdcNytDISXYErx6","slug":"masjid-taqwa","isApproved":true,"menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"types":[],"suburb":"Sandy Hill","description":"Masjid Taqwa, also known as the Islamic Society of Sandy Hill, has been a significant presence in Ottawa since its establishment in 1996. It functions as a comprehensive community center, fostering a welcoming environment for Muslims from various backgrounds. The organization is dedicated to preserving Islamic identity and promoting a holistic Islamic way of life within the local community.\n\nThe center offers a range of core services, including daily prayers, Jumu'ah congregations, Taraweeh prayers during Ramadan, and Eid celebrations, all aimed at fostering spiritual unity and growth. Educational programs are also a key focus, with Islamic classes meticulously designed for diverse ages and proficiency levels. These classes cover subjects such as Quranic studies, Tafseer, Arabic language, and various Islamic lectures, providing insights into the faith.\n\nBeyond spiritual and educational offerings, Masjid Taqwa emphasizes community connection through various events and social gatherings. These activities include workshops, neighborhood cleanups, youth programs, and Iftar meals, all designed to strengthen bonds, foster unity, and create a sense of belonging among its members.","socialMediaLinks":[""],"averageRating":0,"address":"117 Mann Ave, Ottawa, ON K1N 6Y7","isFeatured":false,"plan":"basic","lng":0,"category":["Mosques","Organizations"],"phoneNumber":"613-230-0111","createdAt":"2026-05-16T10:07:29.355Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/masjid-taqwa.webp"],"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-05-23T15:29:49.432Z","openingHours":"","cuisine":[],"name":"Masjid Taqwa","menuPdfUrl":"","email":"info@masjidtaqwa.ca","website":"https://www.masjidtaqwa.ca","reviewCount":0,"lat":0},{"id":"9FqlzuNww0mW7Dq6QjJ2","types":["Shawarma"],"isApproved":true,"menuItems":[{"items":[{"description":"","price":"","name":""}],"category":""}],"slug":"ya-habibi","socialMediaLinks":[""],"description":"Ya Habibi is a restaurant in Ottawa known for its Halal Lebanese and Middle Eastern cuisine. The establishment offers a casual and family-friendly dining experience, presenting a diverse menu of traditional dishes.\n\nThe menu at Ya Habibi features a variety of platters, sandwiches, and sides. Popular selections include the Falafel Platter, Chicken Shawarma Platter, and Mixed Shawarma Platter, which are typically accompanied by rice, garlic potatoes, salad, hummus, garlic sauce, and pita bread. Sandwich options, such as the Chicken Shawarma Sandwich and Beef Donair Sandwich, are also available.\n\nSpecialties include classic Middle Eastern items like Taboule and Hummus, alongside their distinct garlic potatoes. For those with a sweet tooth, desserts like Baklava are offered. Ya Habibi provides dining services for breakfast, lunch, and dinner, in addition to catering, all within a warm, inviting, and cozy atmosphere suitable for various meal occasions.","suburb":"Centretown","address":"160 Elgin St, Ottawa, ON K2P 2C4","averageRating":0,"phoneNumber":"(613) 234-2424","category":["Restaurants"],"lng":0,"plan":"basic","isFeatured":false,"photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/ya-habibi-photo.webp"],"createdAt":"2026-04-17T18:41:26.712Z","name":"Ya Habibi","cuisine":["Middle Eastern","Lebanese"],"openingHours":"","updatedAt":"2026-06-06T09:21:59.177Z","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","reviewCount":0,"website":"","email":"","menuPdfUrl":"","lat":0,"photo":"/uploads/ya-habibi-photo.webp"},{"id":"9IzQuEjnmoGnmRFll5P3","socialMediaLinks":[""],"description":"Abdullah Issa Masjid is a community mosque established in memory of Abdullah Issa, who passed away at the age of 17 after a courageous journey with illness. The masjid was founded as a lasting community space inspired by his character, strength, and the impact he had on those around him.\n\nThe mosque serves as a place for congregational prayer and community gathering, providing a welcoming environment for individuals and families in the area. It reflects values of resilience, unity, and compassion that continue to guide its purpose within the community.\n\nAbdullah Issa Masjid currently hosts the five daily prayers as well as the weekly Friday prayer. It functions as an active place of worship and connection, supporting the spiritual and communal needs of local residents.","suburb":"Nepean","types":[],"menuItems":[{"items":[{"description":"","price":"","name":""}],"category":""}],"isApproved":true,"slug":"abdullah-issa-masjid","phoneNumber":"(613) 222-7263","plan":"basic","lng":-75.6972,"category":["Mosques"],"isFeatured":false,"address":"154 Colonnade Rd S, Ottawa, ON K2E 7J5","averageRating":0,"name":"Abdullah Issa Masjid","updatedAt":"2026-06-06T09:26:19.391Z","openingHours":"","cuisine":[],"submittedBy":"TlnotBahl2WlhBon7hvn0puRW193","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/abdullah-issa-masjid-photo.webp"],"createdAt":"2026-03-24T13:47:57.700Z","lat":45.4215,"photo":"https://lh3.googleusercontent.com/gps-cs-s/AHVAweqyYbV03v-HIGMuLHzKZ4zN2uKU-7fno47wH9BGUfW4CQE_DYKw3vjY3aMv-0fTiwSHlVaaZLopKdW9V9OKROW09A4FwT2pM8ibxDttOKmCvp9QOc8CiT_cUtHK-G-ZrDLT0hZPaQFn7egS=s680-w680-h510","website":"","email":"","reviewCount":0,"menuPdfUrl":""},{"id":"Am4S345U504Wvqh6fAiS","lat":0,"menuPdfUrl":"","reviewCount":0,"email":"","website":"https://www.smokedroyale.ca","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","openingHours":"","cuisine":[],"updatedAt":"2026-05-23T15:46:43.949Z","name":"Smoked Royale","createdAt":"2026-05-15T15:20:00.766Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/smoked-royale.webp"],"isFeatured":false,"lng":0,"category":["Restaurants"],"plan":"basic","phoneNumber":"613-722-1203","averageRating":0,"address":"1203 Wellington St. W, Ottawa, ON K1Y 2Z7","suburb":"Hintonburg","description":"Smoked Royale is a restaurant located in Ottawa, specializing in smoked meat dishes. The establishment offers a selection of hearty and flavorful meals, built around premium, carefully seasoned smoked meat served on freshly baked bread. Their menu is designed to cater to those seeking classic deli-style sandwiches and other comfort food items in the Ottawa area. \n\nAmong the popular menu items at Smoked Royale are the Big Royale Sandwich, Classic Smoked Meat, and Smoked Meat on Baguette. For those seeking a unique offering, the Royale Nachos feature tortilla chips loaded with Montreal smoked meat, melted cheddar cheese, jalapeños, corn, nachos sauce, and green olives. \n\nThe menu further extends to include a variety of smoked meat and roast beef combinations served on baguettes, as well as Smoked Meat Poutine. Other options include different cheese steaks, a Smoked Meat on Burger Bun, The Royal Box, and various turkey and salami sandwiches.","socialMediaLinks":[""],"slug":"smoked-royale","menuItems":[{"items":[{"description":"","price":"","name":""}],"category":""}],"isApproved":true,"types":["Burgers","Poutine"]},{"id":"B2fkbFyUJVPo3jVZb1ZE","createdAt":"2026-05-15T15:18:26.203Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/shawarma-heaven.webp"],"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-05-23T15:48:14.751Z","cuisine":["Middle Eastern","Lebanese","Syrian"],"openingHours":"","name":"Shawarma Heaven","menuPdfUrl":"","website":"https://www.shawarmaheaven.ca","email":"shawarmaheaven@hotmail.com","reviewCount":0,"lat":0,"slug":"shawarma-heaven","menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"isApproved":true,"types":["Shawarma","Poutine"],"suburb":"Nepean","description":"Shawarma Heaven is a restaurant located in Ottawa, Ontario, which opened its doors to customers in June 2016. It aims to provide a family-friendly and welcoming environment, offering options for dine-in, takeout, and online delivery.\n\nThe restaurant specializes in traditional Middle Eastern cuisine, featuring a diverse menu that encompasses sandwiches, combos, side dishes, and family platters. Popular menu selections often highlight chicken and beef shawarma, available in various preparations such as wraps and plates.\n\nKey specialties include their signature shawarma, typically served with garlic sauce and hummus, alongside additional offerings like falafel, garlic potatoes, and tabbouleh salad. For beverages and desserts, the establishment provides fruit cocktails, soft drinks, and Baklava. Shawarma Heaven is also certified halal, ensuring all food adheres to Islamic dietary standards.","socialMediaLinks":[""],"averageRating":0,"address":"129 Riocan Ave, Nepean, ON K2J 5G3","isFeatured":false,"plan":"basic","lng":0,"category":["Restaurants"],"phoneNumber":"613-823-3330"},{"id":"B8DacUjLgfj1XnIZSg1t","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/mr-kabab-photo.webp"],"createdAt":"2026-04-16T17:06:01.183Z","name":"Mr. Kabab","openingHours":"","cuisine":["Syrian","Middle Eastern"],"updatedAt":"2026-06-07T20:16:12.506Z","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","reviewCount":0,"website":"https://mr-kabab.ca/","email":"info@mr-kabab.ca","menuPdfUrl":"","lat":0,"photo":"/uploads/mr-kabab-photo.webp","types":["Shawarma"],"menuItems":[{"items":[{"price":"","description":"","name":""}],"category":""}],"isApproved":true,"slug":"mr-kabab","socialMediaLinks":[""],"description":"Mr. Kabab is an eatery in Ottawa known for its authentic Syrian cuisine. It offers a diverse menu that captures the rich flavors and traditions of Syria, aiming to provide a delightful dining experience. The establishment emphasizes genuine Syrian hospitality and a commitment to quality and service.\n\nThe heart of Mr. Kabab's offerings lies in its expertly grilled meats, with diners able to savor succulent lamb kababs, tender chicken kebabs, and juicy beef kebabs. These are often served with aromatic rice or warm pita bread. The menu also features customizable platters, such as the Family Turbo and Family Twin Turbo, which include various grilled meats like Filet Mignon and Shish Tawook, accompanied by appetizers and drinks.\n\nFor more casual dining, Mr. Kabab presents a selection of sandwiches, including the popular lamb kabab sandwich, chicken kabab sandwiches, and filet mignon sandwiches, typically wrapped in pita bread with traditional toppings. Appetizers such as hummus, creamy garlic dip, eggplant dip, lentil soup, and fresh salads like tabbouleh are also available. Vegetarian options like falafel and fresh salads are also catered for.","suburb":"Heron Park","address":"1549 Bank St, Ottawa, ON K1H 7Z3","averageRating":0,"phoneNumber":"(613) 570-4949","category":["Restaurants"],"lng":0,"plan":"basic","isFeatured":false},{"id":"BBIC89HS2S1CB5jrvi0o","lat":0,"menuPdfUrl":"","website":"https://zaytounpizza.ca","email":"","reviewCount":0,"updatedAt":"2026-05-23T15:37:38.396Z","cuisine":["Italian","Mediterranean"],"openingHours":"","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","name":"Zaytoun Pizza","createdAt":"2026-05-15T15:24:22.232Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/zaytoun-pizza.webp"],"isFeatured":false,"phoneNumber":"613-731-0111","plan":"basic","lng":0,"category":["Restaurants"],"averageRating":0,"address":"1588 Walkley Rd, Ottawa, ON K1V 6P5","description":"Zaytoun Pizza is an Ottawa eatery known for its extensive menu of Halal cuisine. The establishment focuses on providing quality Halal meats and fresh, locally sourced ingredients, including Halal Gluten-Free and Keto pizza options.\n\nThe menu features a wide array of pizzas, including customizable 'Build Your Own Pizza' options and various 'Signature Pizzas' like Hawaiian, Texas style, and Philly Steak. Beyond pizza, Zaytoun offers hearty 'Mains' such as club sandwiches, cheeseburgers, chicken burgers, donairs with signature Zaytoun sauce, and steak subs. Pasta dishes like lasagna and spaghetti with homemade meat sauce are also available.\n\nComplementing the main courses are diverse 'Finger Foods' including mozzarella sticks, jalapeño poppers, chicken wings, french fries, onion rings, zucchini sticks, and garlic bread. Customers can also choose from a selection of poutines and 'Weezeys', notably the popular Chicken Weezey. The dessert menu includes cheesecake, triple chocolate cake, carrot cake, and fresh mini donuts.","suburb":"South Keys","socialMediaLinks":[""],"slug":"zaytoun-pizza","types":["Pizza","Poutine","Shawarma","Burgers"],"isApproved":true,"menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}]},{"id":"BY8EcsZHbxu51q1vf28w","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/the-egyptian-corner-photo.webp"],"createdAt":"2026-04-21T14:41:35.805Z","name":"The Egyptian Corner","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-06-07T18:47:56.117Z","openingHours":"","cuisine":["Middle Eastern"],"email":"","website":"","reviewCount":0,"menuPdfUrl":"","lat":0,"menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"isApproved":true,"types":["Shawarma"],"slug":"the-egyptian-corner","socialMediaLinks":[""],"suburb":"Heron Park","description":"The Egyptian Corner is a family-run establishment in Ottawa, offering authentic Egyptian cuisine. It originated as a food truck before establishing its current permanent location. The restaurant aims to provide traditional Egyptian dishes, prepared with authentic spices and cooking techniques.\n\nKey menu items include Koshari, a traditional Egyptian dish featuring layers of rice, lentils, pasta, and chickpeas, topped with fried onions and served with tangy tomato sauce, a tart vinaigrette, and spicy daqqa. The menu also highlights a variety of sandwiches, such as liver, chicken, and hawawshi made with savory ground beef and onions.\n\nOther specialties feature falafel, prepared in the Egyptian style using fava beans, served in soft pita bread with fresh vegetables, grilled eggplant, and potato chips. The restaurant also serves moussaka, a rich dish with layers of fried eggplant, potatoes, and bell peppers in a tomato sauce, alongside shakshouka and traditional Egyptian desserts like rice pudding and Umm Ali.","address":"1563 Bank St, Ottawa, ON K1H 7Z3","averageRating":0,"plan":"basic","category":["Restaurants"],"lng":0,"phoneNumber":"(613) 883-3200","isFeatured":false},{"id":"CbNLtPbo9m7zi4u460Er","address":"379 McArthur Ave, Ottawa, ON K1K 1G7","averageRating":0,"plan":"basic","lng":0,"category":["Grocery","Butchers"],"phoneNumber":"(613) 744-6634","isFeatured":false,"menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"isApproved":true,"types":[],"slug":"mc-halal-meat-grocery","socialMediaLinks":[""],"suburb":"Vanier","description":"MC Halal Meat & Grocery is a local market offering fresh halal meats and a diverse selection of essential grocery items. It is recognized as a neighborhood market that focuses on providing dependable halal food options to the community.\n\nThe establishment features a butcher counter with a variety of halal-certified meats, including chicken, beef, and lamb, all prepared according to Islamic dietary guidelines. The store prides itself on ethically sourced halal products to meet the needs of its customers.\n\nBeyond fresh meats, MC Halal Meat & Grocery stocks a wide array of grocery products such as rice, spices, cooking oils, legumes, and frozen foods. They also offer specialty international items, catering to diverse culinary traditions and supporting authentic home cooking from various cultures.","email":"","website":"","reviewCount":0,"menuPdfUrl":"","photo":"/uploads/mc-halal-meat-grocery-photo.webp","lat":0,"photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/mc-halal-meat-grocery-photo.webp"],"createdAt":"2026-04-18T13:25:54.903Z","name":"MC Halal Meat & Grocery","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-06-06T13:18:48.463Z","openingHours":"","cuisine":[]},{"id":"CfoDxCMbFsy6SHMICFrI","lat":0,"menuPdfUrl":"","website":"https://cozamia.com","email":"","reviewCount":0,"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-05-23T16:11:22.214Z","openingHours":"","cuisine":["Moroccan","Mediterranean","Italian"],"name":"Cozamia","createdAt":"2026-05-15T01:48:40.921Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/cozamia.webp"],"isFeatured":false,"plan":"basic","lng":0,"category":["Restaurants"],"phoneNumber":"613-241-1111","averageRating":0,"address":"32 Byward Market Square, Ottawa, ON K1N 7A2","suburb":"Lowertown","description":"Cozamia is a restaurant situated in Ottawa's ByWard Market, offering a halal dining experience that blends Moroccan traditions with modern Mediterranean influences. It is recognized for its diverse menu and provides options for dining in, takeout, and delivery through platforms like DoorDash.\n\nThe menu at Cozamia features hearty platters such as Cozamia Machawi, which includes seasoned meats, rice or potatoes, fresh pita bread, and garlic sauce. The establishment also serves Moroccan French Tacos, a fusion dish incorporating North African spices, along with a selection of sandwiches, gourmet pizzas, and pastas.\n\nFor those seeking morning options, Cozamia offers a Mediterranean breakfast. Other notable menu items include various Moroccan sandwiches, Mediterranean pies with fillings like meat, cheese, or vegetables, and a range of Moroccan smoothies. Additionally, the restaurant provides options like Moroccan Burgers, chicken wings, and Poutine tacu.","socialMediaLinks":[""],"slug":"cozamia","isApproved":true,"menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"types":["Pizza","Burgers","Poutine","Breakfast","Tacos"]},{"id":"CtwsHfqTVCg4hnaXfU3F","lat":0,"menuPdfUrl":"","email":"","website":"https://sabapalace.ca","reviewCount":0,"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-06-06T09:21:10.757Z","openingHours":"","cuisine":["Middle Eastern","Yemeni"],"name":"Saba Palace","createdAt":"2026-05-15T02:06:17.521Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/saba-palace-photo.webp"],"isFeatured":false,"plan":"basic","category":["Restaurants"],"lng":0,"phoneNumber":"613-822-2228","averageRating":0,"address":"5031 Bank St, Ottawa, ON K1A 0B1","suburb":"Old Ottawa South","description":"Saba Palace is a restaurant located in Ottawa, offering an authentic taste of Yemeni and Middle Eastern cuisine. The establishment is dedicated to sharing the rich culinary traditions of the Arab world, emphasizing traditional spices and slow-cooked preparations. It provides a warm and inviting atmosphere for its guests. \n\nThe menu features a diverse selection of dishes, including traditional Yemeni specialties such as tender lamb mandi, succulent chicken mandi, and haneeth lamb, alongside sizzling Fahsa. Guests can also find aromatic biryanis and flavorful stews like Saltah and Oqda, with options for both lamb and chicken. Freshly baked pita bread complements many of the dishes served. \n\nAppetizer choices include creamy hummus, smoky baba ghanoush, and crispy falafel, as well as various salads such as refreshing fattoush and tabula. The restaurant also provides specialty beverages like traditional Adeni Tea, designed to complement the hearty meals. Saba Palace prides itself on preparing its dishes with halal and locally sourced ingredients.","socialMediaLinks":[""],"slug":"saba-palace","menuItems":[{"items":[{"description":"","price":"","name":""}],"category":""}],"isApproved":true,"types":["Bakery","Shawarma"]},{"id":"D5bnfXN2B1RjWrz9Wfiq","slug":"the-garlic-king","menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"isApproved":true,"types":["Shawarma","Poutine"],"suburb":"Orléans","description":"The Garlic King is an established Ottawa-based family restaurant, noted for serving Middle Eastern cuisine, particularly shawarma, for over 27 years. Originally opened in 1995 as \"Really Lebanese Food,\" the establishment later rebranded, with its owner adopting the distinct \"Garlic King\" persona. The restaurant offers a variety of dishes and focuses on fresh ingredients.\n\nThe menu features an array of shawarma options, including chicken, beef, donair, and falafel, available as wraps or platters. Customers can choose from an assortment of sides such as rice, garlic potatoes, fattoush salad, and a three-bean salad. The restaurant also provides gluten-friendly wraps and platters, along with a selection of vegetarian choices like falafel and grape leaves.\n\nBeyond shawarma, The Garlic King's offerings extend to homemade kabob platters and poutine, which can be prepared gluten-free upon request. Notable specialty items include \"The Omar Platter,\" \"Elvis's Revenge\" (a spicy shawarma), and \"The Alexi Crunch,\" featuring chicken, donair, and King fries. The establishment also serves various starters and extras like hummus, baba ghanoush, garlic sauce, and baklava, and provides catering and takeout services.","socialMediaLinks":[""],"averageRating":0,"address":"2586 St Joseph Blvd, Ottawa, ON K1C 1G6","isFeatured":false,"category":["Restaurants"],"lng":0,"plan":"basic","phoneNumber":"613-834-5464","createdAt":"2026-04-17T18:37:03.400Z","photos":["https://heartoforleans.ca/wp-content/uploads/2020/10/Garlic-King_11July-2020-scaled-1.jpg"],"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","cuisine":["Lebanese","Middle Eastern"],"openingHours":"","updatedAt":"2026-06-06T03:20:05.925Z","name":"The Garlic King","menuPdfUrl":"","reviewCount":0,"email":"","website":"https://garlicking.com","photo":"/uploads/the-garlic-king-photo.webp","lat":0},{"id":"DvCxANnwc7UjkP2Qrw5f","website":"https://digbys.ca","email":"","reviewCount":0,"menuPdfUrl":"","lat":0,"photo":"","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/digby-s-restaurant-photo.webp"],"createdAt":"2026-04-21T14:40:26.426Z","name":"Digby's Restaurant","updatedAt":"2026-06-06T03:27:55.245Z","cuisine":["Middle Eastern"],"openingHours":"","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","address":"300 Earl Grey Dr, Kanata, ON K2T 1C1","averageRating":0,"phoneNumber":"613-591-3442","plan":"basic","lng":0,"category":["Restaurants"],"isFeatured":false,"types":["Burgers","Seafood","Poutine","Fried Chicken"],"isApproved":true,"menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"slug":"digbys-restaurant","socialMediaLinks":[""],"description":"Digby's Restaurant offers a delightful dining experience in Kanata, specializing in a diverse menu that celebrates halal cuisine. The establishment is known for its inviting atmosphere, providing a comfortable setting for various dining occasions. It is a casual eatery that has become a popular spot for those seeking seafood and other familiar dishes.\n\nThe menu features a wide array of options, including appetizers such as calamari, fried jumbo shrimps, and jalapeno poppers, often served with enhancing dipping sauces. Guests can explore hearty selections like burgers and sandwiches, with highlights including a Beef Burger Platter and a Grilled Salmon Burger. Other notable offerings include wraps like the Grilled Chicken Wrap Platter and Crab Meat Wrap Platter, served with lightly seasoned fries and coleslaw. Diners can also choose from a selection of soups and salads, including Digby's Clam Chowder Soup, Caesar Salad, and Fattoush Salad, alongside various fish fillet preparations.\n\nSpecialties at Digby's Restaurant Halal revolve around its seafood dinners, such as the Shrimp Dinner, and a range of fish and chips options including Haddock, Cod, Alaskan Pollock, Salmon, and Sole. The restaurant also offers poutines and upgrades, chicken wings, and Digby's Special boxes like the Seafood Box, which includes haddock, popcorn shrimp, and calamari, accompanied by fries, onion rings, and dipping sauces. The focus on fresh ingredients and generous portions aims to ensure a satisfying dining experience.","suburb":"Kanata"},{"id":"E2N4ACkgE5JorgepLLqw","reviewCount":0,"email":"info@alnourschool.ca","website":"http://alnourschool.ca","menuPdfUrl":"","photo":"https://lh3.googleusercontent.com/gps-cs-s/AHVAweotk0VVmipkyHyzwH-VP0iFW2L6SQrPKs0lY1K8RitkvAAvr9OJjMg17COHRqNDVAGIQFXtM_GwndhG3DgZexCsP35WDvntgvvY9dxEg7UjYo9Hc5yXHV-o5GMYaZzClCRvOiM","lat":45.4215,"photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/alnour-school.webp"],"createdAt":"2026-03-25T14:46:20.760Z","name":"Alnour School","submittedBy":"TlnotBahl2WlhBon7hvn0puRW193","openingHours":"","cuisine":[],"updatedAt":"2026-05-23T16:46:24.181Z","address":"35 Dovercourt Ave, Ottawa, ON K1S 0A7","averageRating":0,"lng":-75.6972,"category":["Schools","Organizations"],"plan":"basic","phoneNumber":"613-230-6600","isFeatured":false,"menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"isApproved":true,"types":[],"slug":"alnour-school","socialMediaLinks":[""],"suburb":"Westboro","description":"Alnour School is a well-established weekend Arabic and Islamic school in Ottawa, serving children and youth from Junior Kindergarten to Grade 8.\n\nThe school is part of the International Language Program and is designed to complement students’ regular education while strengthening their connection to language and faith.\n\nThe program focuses on teaching Arabic language, Quran, and Islamic studies, with all subjects delivered in Arabic to help students build strong language skills alongside their religious knowledge.\n\nClasses are typically held on Saturdays during the school year, creating a structured yet flexible learning environment for families.\n\nAlnour School aims to provide a balanced educational experience that helps students preserve their cultural and Islamic identity while growing up in Canada."},{"id":"EjM4a3HPCKTq9ypaAKyG","suburb":"Fairfield Heights","description":"Salang Kabob House is an establishment located in Ottawa, offering authentic Afghan and Pakistani cuisine. The restaurant focuses on a fusion of traditional flavors, prepared 100% Halal, and made fresh daily.\n\nThe menu at Salang Kabob House features a diverse selection of dishes centered around flavorful, char-grilled kabobs, including Shami, Chaplee, Tikka, and Tandoori options. Specialties encompass lamb shank and butter chicken. Vegetarian options are also available, such as eggplant qorma and dal channa. Complementing the main courses are freshly baked naan, various rice dishes, and traditional desserts like firnee and gulab jamun.\n\nBeyond kabob platters, Salang Kabob House provides a range of wraps, including beef or chicken shami wraps and beef tikka or chicken breast wraps. The restaurant also offers different qorma (stew) platters and appetizers such as Bolani, a stuffed flatbread. For those seeking a different option, bun kabob burgers are also on the menu.","socialMediaLinks":[""],"slug":"salang-kabob-house","menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"isApproved":true,"types":[],"isFeatured":false,"category":["Restaurants"],"lng":0,"plan":"basic","phoneNumber":"(613) 820-0007","averageRating":0,"address":"2934 Carling Ave, Ottawa, ON K2B 7H6","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","openingHours":"","cuisine":["Afghani","Pakistani"],"updatedAt":"2026-06-07T19:49:19.416Z","name":"Salang Kabob House","createdAt":"2026-04-16T17:13:25.765Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/salang-kabob-house-photo.webp"],"photo":"/uploads/salang-kabob-house-photo.webp","lat":0,"menuPdfUrl":"","reviewCount":0,"email":"info@salangkabob.ca","website":"https://www.salangkabobhouse.ca/"},{"id":"Erf0j6Oaj6HPwuLh5NlS","socialMediaLinks":[""],"description":"Night Bite is a delivery-focused restaurant operating in Ottawa, specializing in satisfying late-night cravings. As a virtual brand, it primarily functions through popular food delivery platforms, offering a convenient option for residents seeking meals during evening and late hours. The establishment emphasizes fresh and juicy offerings, catering to a clientele looking for a hearty bite outside of traditional dining hours.\n\nThe menu features a variety of comfort food items, with a strong focus on smash burgers and poutines. Burger selections include the Cheesy Smash, Bacon Smash Platter, Steak Out, and the Mushroom Triple Smash Platter, which combines smashed patties with caramelized onions and house sauce on a brioche bun, served with fries and gravy. Poutine options are extensive, ranging from the Authentic with fries, cheese curds, and gravy, to more elaborate versions like the Cheeseburger Poutine, Club-House Poutine with chicken and halal bacon, and a spicy Firestorm Poutine.\n\nBeyond burgers and poutines, Night Bite offers a selection of sandwiches and wraps, such as the Marinated Chicken Sub, Meat Lover Sub featuring halal chicken, steak, and pepperoni, and crispy chicken wraps. Appetizers like fries, onion rings, and jalapeno poppers are available. For those with a sweet tooth, the dessert menu includes homemade cheesecakes in various flavors, including Vimto Caramel and Pistachio, as well as Ice Cream Knafeh. Additionally, unique items like Chapati and Karak, with options for Nutella or cheese and honey, are offered.","suburb":"Alta Vista","types":["Burgers","Poutine","Fried Chicken","Sandwiches","Desserts"],"menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"isApproved":true,"slug":"night-bite","phoneNumber":"613-695-0010","category":["Restaurants"],"lng":0,"plan":"basic","isFeatured":false,"address":"2786 Lancaster Rd, Ottawa, ON K1B 4S6","averageRating":0,"name":"Night Bite","openingHours":"","cuisine":["American","Canadian"],"updatedAt":"2026-05-23T16:02:25.132Z","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/night-bite.webp"],"createdAt":"2026-05-15T02:03:44.654Z","lat":0,"reviewCount":0,"website":"https://nightbite.ca","email":"","menuPdfUrl":""},{"id":"F8EJD2q70kX8Lt5dht3i","description":"Shawarma Master is a Middle Eastern restaurant located in Ottawa, offering a diverse menu with a particular focus on authentic shawarma dishes. The eatery provides a welcoming and casual dining experience, making it suitable for a relaxed meal. It is recognized for its selection of platters, combos, and sandwiches, crafted to satisfy a range of tastes.\n\nThe menu at Shawarma Master features popular items such as the Mix Shawarma Plate, which combines tender chicken and beef, and the Family Shawarma Platter, designed to serve larger groups with an array of meats and delicious dips. Patrons can also enjoy the Chicken Shawarma Sandwich and various Trio Specials that include a sandwich, a side like garlic potatoes or rice, and a drink.\n\nBeyond traditional shawarma offerings, Shawarma Master presents unique options such as the Shawarma Poutine, including spicy variations like the jalapeno shawarma poutine. The menu also caters to vegetarian preferences with items like the Fresh Falafel Plate and Falafel Sandwich, alongside a variety of sides such as fattoush salad, hummus, and garlic potatoes. The restaurant's dedication to quality ingredients and diverse menu selections makes it a notable destination for Middle Eastern cuisine.","suburb":"Kanata","socialMediaLinks":[""],"slug":"shawarma-master","types":["Shawarma","Poutine"],"isApproved":true,"menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"isFeatured":false,"phoneNumber":"613-271-9696","lng":0,"category":["Restaurants"],"plan":"basic","averageRating":0,"address":"500 Eagleson Rd, Ottawa, ON K2M 1N4","openingHours":"","cuisine":["Middle Eastern"],"updatedAt":"2026-06-06T03:27:26.838Z","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","name":"Shawarma Master","createdAt":"2026-05-15T01:52:32.290Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/shawarma-master-photo.webp"],"lat":0,"menuPdfUrl":"","reviewCount":0,"website":"https://shawarmamaster.ca","email":""},{"id":"F8mVkBIFOg4HOvM5CcQ5","phoneNumber":"(613) 890-2590","lng":0,"category":["Grocery","Restaurants"],"plan":"basic","isFeatured":false,"address":"99 Mann Avenue, Ottawa, ON K1N 6Y7","averageRating":0,"so icated to strengthening Islamic learning for children and teens.\n\nThe community is also active in charitable efforts, offering Zakat and Sadaqa services to help those in need.","socialMediaLinks":[""],"averageRating":0,"address":"3990 Old Richmond Rd, Nepean, ON K2H 8T9","isFeatured":false,"category":["Mosques"],"lng":-75.6972,"plan":"basic","phoneNumber":"613-820-2223","createdAt":"2026-03-24T00:35:21.798Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/jami-omar.webp"],"submittedBy":"TlnotBahl2WlhBon7hvn0puRW193","cuisine":[],"openingHours":"","updatedAt":"2026-05-24T16:22:30.671Z","name":"Jami Omar","menuPdfUrl":"","reviewCount":0,"email":"info@jamiomar.ca","website":"https://jamiomar.ca","photo":"https://lh3.googleusercontent.com/gps-cs-s/AHVAweqC8EhwK4ytbefegHdb2yFmIHoA7dglDgvxHZsIjeSYtoHR41kTmLitcLB0f2ktsoYqwrFphKJXWJzq58-0jiG-xKXuP5Fs1zVqUpZTkRJzFmfBqE7myk1_vMCZCu7nzCcGbWBpxA=s680-w680-h510","lat":45.4215},{"id":"GVSxN8KOebLt338FwgJV","lng":0,"category":["Restaurants"],"plan":"basic","phoneNumber":"613-565-3162","isFeatured":false,"address":"164 Laurier Ave W, Ottawa, ON K1P 5J6","averageRating":0,"socialMediaLinks":[""],"suburb":"Centretown","description":"Laurier B International, also known as Laurier Buffet or Laurier Bangla, is a dining establishment in Ottawa that offers a diverse array of international flavors. The restaurant is dedicated to sharing authentic tastes with its community, striving to provide a comprehensive culinary experience. It operates throughout the week with varying hours, offering both lunch and dinner services on most days.\n\nThe menu at Laurier B International features a blend of cuisines, including Indian, Middle Eastern, Italian, and Canadian dishes. Patrons can explore options such as Lamb Bhuna, Butter Chicken, and a variety of mixed vegetables. Middle Eastern selections include lamb, chicken, and beef kebabs served with rice and naan. For those interested in Italian fare, the menu offers calamari, b
