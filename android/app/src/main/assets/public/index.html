    <script>window.__INITIAL_ROUTE_TYPE__ = "home"; window.__INITIAL_DATA__ = {"listings":[{"id":"02zzhg4nswGKbYjYbERz","phoneNumber":"(613) 722-3827","plan":"basic","lng":0,"category":["Grocery","Butchers","Restaurants"],"isFeatured":false,"address":"557 Kirkwood Ave, Ottawa, ON K1Z 5X3","averageRating":0,"socialMediaLinks":[""],"description":"Al Kalaa Mini Market is a family-owned halal grocery and meat market located in Ottawa, offering a wide array of essential food products and specialty items that cater to diverse cultural cuisines. This ethnic supermarket serves as a convenient one-stop shop for Middle Eastern cookery and ingredients, providing a welcoming environment for shoppers seeking specific items not commonly found in larger chain stores.\n\nThe market features a dedicated halal butcher department that offers fresh, halal-certified meats, including local lamb and beef sourced from a farmers' auction. Patrons can find traditional Middle Eastern delicacies such as makanek and soujouk sausages, along with kibbe. Beyond the fresh meats, the store stocks a variety of dried goods, including chick peas, beans, dried fruits, as well as an extensive selection of pistachios and other nuts and snacks.\n\nIn addition to its grocery and butcher services, Al Kalaa Mini Market also offers a selection of prepared foods, available for delivery through platforms like Uber Eats under the name Al Kalaa Shawarma. Popular menu items include Chicken Shawarma and Beef Shawarma, along with sides such as hummus and babaganoush. Other specialties that can be found are meat pies, falafel sandwiches, and desserts like Dubai Knaffeh and Biscoff.","suburb":"Westboro","types":["Shawarma"],"menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"isApproved":true,"slug":"al-kalaa-mini-market","lat":0,"photo":"/uploads/al-kalaa-mini-market-photo.webp","website":"","email":"","reviewCount":0,"menuPdfUrl":"","name":"Al Kalaa Mini Market","updatedAt":"2026-06-06T03:40:57.184Z","openingHours":"","cuisine":["Middle Eastern","Turkish"],"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/al-kalaa-mini-market-photo.webp"],"createdAt":"2026-04-17T18:47:00.509Z"},{"id":"0ETohQ8reW3GREKtOLp1","suburb":"Nepean","description":"Tasty Junction Indian Eatery offers an authentic Indian dining experience with a modern touch, committed to using quality ingredients to craft a diverse menu. The establishment prides itself on its chef's extensive experience in blending traditional Indian flavors with fresh, contemporary culinary approaches. Every dish is prepared with care to deliver a harmonious balance of tradition and innovation.\n\nThe menu features a variety of appetizers such as samosas and aloo tikki chaat, alongside their signature Tandoori Paranthe. Guests can explore a range of burgers, including Aloo Tikki Burger and Crispy Chicken Burger. The Hakka section presents Indo-Chinese specialties like Veg Manchurian (dry or gravy), Veg Hakka Noodles, and Chilli Chicken.\n\nMain course options include popular vegetarian curries like Dal Makhani and Kadai Paneer, as well as non-vegetarian choices such as Butter Chicken, Chicken Tikka Masala, and Malai Methi Chicken. The restaurant also offers a selection of Tandoori Tikka items like Paneer Tikka and Chicken Tikka, complemented by various Rice & Biryani dishes, and a choice of refreshing beverages and desserts.","socialMediaLinks":[""],"slug":"tasty-junction","isApproved":true,"menuItems":[{"items":[{"description":"","price":"","name":""}],"category":""}],"types":["Burgers","Shawarma","Biryani"],"isFeatured":false,"lng":0,"category":["Restaurants"],"plan":"basic","phoneNumber":"613-680-7799","averageRating":0,"address":"1950 Merivale Rd Unit 5, Ottawa, ON K2G 5T5","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","cuisine":["Indian","Chinese"],"openingHours":"","updatedAt":"2026-05-23T16:01:40.464Z","name":"Tasty Junction","createdAt":"2026-05-15T02:04:03.603Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/tasty-junction.webp"],"lat":0,"menuPdfUrl":"","reviewCount":0,"website":"https://tastyjunction.ca","email":"tastyjunctioneatery@gmail.com"},{"id":"0KwXpE8XGiAHknJI5MZJ","isFeatured":false,"lng":0,"category":["Restaurants"],"plan":"basic","phoneNumber":"613-834-0808","averageRating":0,"address":"1615 Orleans Blvd, Ottawa, ON K1C 7E2","suburb":"Orléans","description":"Cedar Valley Restaurant is an establishment located in the Ottawa area, known for serving authentic Lebanese cuisine. With over two decades of operation, it aims to offer a traditional culinary experience. The restaurant is recognized for its commitment to quality and classic recipes.\n\nThe menu at Cedar Valley Restaurant features a variety of Lebanese dishes. Popular items include different types of shawarma, such as Chicken Shawarma Plate and Shawarma Sandwiches, alongside family platters designed for sharing. The appetizer selection includes hummus, tabbouleh, fattoush, spiced potatoes, grape leaves, and fried eggplant.\n\nBeyond individual dishes, specialties like the famous Shawarma Pita, refreshing fattouch, and creamy hummus are highlighted. The restaurant also offers other plates such as shish kebab, lamb kebab, chicken brochettes, and kafta, as well as desserts like baklava. Catering services are available, bringing Lebanese flavors to various events.","socialMediaLinks":[""],"slug":"cedar-valley-restaurant","isApproved":true,"menuItems":[{"items":[{"price":"","description":"","name":""}],"category":""}],"types":["Shawarma"],"photo":"/uploads/cedar-valley-restaurant-photo.webp","lat":0,"menuPdfUrl":"","reviewCount":0,"website":"https://cedarvalley.ca","email":"cedarvalleyrestaurant@gmail.com","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","cuisine":["Lebanese","Middle Eastern"],"openingHours":"","updatedAt":"2026-06-06T03:18:00.722Z","name":"Cedar Valley Restaurant","createdAt":"2026-04-17T18:38:53.506Z","photos":["https://cedarvalleyrestaurant.ca/wp-content/uploads/2024/11/8-1024x576.png"]},{"id":"0Zx8mMhXrtZabBqVlaQx","lat":0,"email":"","website":"","reviewCount":0,"menuPdfUrl":"","name":"Holly's Gem Sandwiches","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-05-23T15:29:09.639Z","cuisine":["American"],"openingHours":"","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/hollys-gem-sandwiches.webp"],"createdAt":"2026-05-16T10:07:46.704Z","plan":"basic","lng":0,"category":["Restaurants"],"phoneNumber":"613-737-1244","isFeatured":false,"address":"2435 Holly Lane, Ottawa, ON K1V 7P2","averageRating":0,"socialMediaLinks":[""],"suburb":"South Keys","description":"Holly's Gem Sandwiches is a restaurant in Ottawa known for its diverse selection of sandwiches and comfort food. The establishment provides a welcoming atmosphere, offering a variety of options for a quick meal or a casual dining experience. It is recognized for its commitment to serving fully halal food, making it a prominent feature in Ottawa's halal food scene.\n\nThe menu features an array of signature sandwiches, including options like the Holly's Gem, Holly's Heat, Classic Gem, Smoky Gem, and the CGC (Cool Gem Cuts). These creations often incorporate ingredients such as chicken breast, candied beef bacon, mixed cheddar cheese, jalapeño lime aioli, hot sauce, ranch, provolone cheese, and pesto. Additionally, the menu includes a Breakfast Sandwich with scrambled eggs and sriracha aioli, as well as The Veggie, a sandwich with lettuce, tomato, cucumber, onion, and aioli.\n\nBeyond sandwiches, Holly's Gem offers Holly's House Salad, a mix of greens, candied bacon, cucumber, red onion, tomato, herbs, and honey dijon vinaigrette. The restaurant also provides a selection of beverages and snacks like various soft drinks and chips. The sandwiches are often served on house-made breads, with options like cheddar jalapeño, adding a unique touch to the dining experience.","menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"isApproved":true,"types":["Sandwiches","Breakfast"],"slug":"hollys-gem-sandwiches"},{"id":"0gjJk9CAt1rUK65Y5AtN","slug":"tajine","isApproved":true,"menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"types":[],"suburb":"Lowertown","description":"Tajine Restaurant in Ottawa strives to deliver an authentic Moroccan dining experience, sharing North Africa's rich culinary traditions. The establishment aims to offer a true Moroccan food journey, immersing guests in an atmosphere reminiscent of Marrakech's souks, filled with the aromas of cinnamon, cumin, and fresh herbs.\n\nThe menu at Tajine Restaurant highlights slow-cooked tajines, couscous, and mezze, carefully prepared with fragrant spices, preserved lemon, and distinctive sweet-savory combinations. Featured dishes include various tajines such as chicken, beef, lamb, kafta, and vegetable options, alongside traditional starters like Harira soup and Moroccan salads.\n\nComplementing the main courses, Tajine Restaurant offers a selection of handcrafted desserts, including Moroccan pastries like cornes de gazelle, Nougat Glacee, and Jawhara. The dining experience is further enhanced by traditional Moroccan mint tea and a curated beverage program that features signature cocktails and mocktails.","socialMediaLinks":[""],"averageRating":0,"address":"308 Dalhousie St, Ottawa, ON K1N 7E7","isFeatured":false,"plan":"basic","lng":0,"category":["Restaurants"],"phoneNumber":"613-241-1111","createdAt":"2026-05-15T01:47:21.976Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/tajine.webp"],"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-05-23T16:16:30.786Z","openingHours":"","cuisine":["Moroccan","Middle Eastern"],"name":"Tajine","menuPdfUrl":"","website":"https://tajineottawa.ca","email":"salim@tajineottawa.com","reviewCount":0,"lat":0},{"id":"0yM0kzYE2rj1l8JVidWj","phoneNumber":"613-680-3330","plan":"basic","lng":0,"category":["Restaurants"],"isFeatured":false,"address":"440 Richmond Rd, Ottawa, ON K2A 0G6","averageRating":0,"socialMediaLinks":[""],"description":"Aseer Time is a vibrant, halal-friendly juice bar and dessert café that originated in Kuwait in 2011, known for its colorful, refreshing drinks and indulgent sweets. It has expanded internationally, building a reputation for creative and high-quality beverages that combine fresh fruit, natural ingredients, and unique flavor combinations. The café provides a bright and inviting atmosphere, making it a unique destination for halal-friendly drinks and desserts.\n\nThe menu at Aseer Time offers a wide range of options, including freshly squeezed juices, smoothies, and specialty drinks that mix fruits like mango, kiwi, strawberry, and carrot with inventive pairings. For those with a sweet tooth, the establishment serves layered treats, milkshakes, and sweet beverages that are as visually appealing as they are delicious. Popular items feature unique dessert creations like Crepe Fettuccine, Mini Pancakes, and the viral Dubai Strawberry Cup.\n\nSpecific offerings also include Protein drinks for a quick boost, creamy cookies-and-cream Oreo drinks, and various coffee and tea options such as Iced Americano. Patrons can also enjoy a selection of 'Dubai Signature Flavors' and 'Fresh Fruits Special' concoctions. The establishment emphasizes the careful preparation of each item, adhering to quality and halal standards, to ensure a delightful experience.","suburb":"Westboro","types":["Bakery","Cafés"],"isApproved":true,"menuItems":[{"items":[{"description":"","price":"","name":""}],"category":""}],"slug":"aseer-time","lat":0,"website":"https://aseertime.ca","email":"info@aseertimeottawa.ca","reviewCount":0,"menuPdfUrl":"","name":"Aseer Time","updatedAt":"2026-05-23T15:51:21.670Z","openingHours":"","cuisine":["Middle Eastern"],"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/aseer-time.webp"],"createdAt":"2026-05-15T15:17:46.415Z"},{"id":"1TZypP2alcRohJLQ5zJV","averageRating":0,"address":"1710 Bank St, Ottawa, ON K1V 7Y6","isFeatured":false,"lng":0,"category":["Restaurants"],"plan":"basic","phoneNumber":"(613) 260-2222","slug":"machboos","menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"isApproved":true,"types":["Seafood"],"suburb":"Brookfield Gardens","description":"Machboos is a halal restaurant in Ottawa, known for its authentic Iraqi and Kuwaiti flavors. It aims to offer a culinary experience that blends rich spices, fresh ingredients, and heartfelt hospitality. The establishment provides a warm and welcoming atmosphere for its diners.\n\nThe restaurant's signature dish is Machboos Chicken, available as half or whole portions, featuring tender, succulent meat infused with aromatic rice, raisins, and traditional herbs. Other notable offerings include charcoal-smoked kebabs such as beef, chicken, and shish taouk, which are prepared for a juicy and smoky taste.\n\nThe menu further extends to include lamb-based dishes and various fish options, such as Zubaidi fish and Tilapia fish. Patrons can also find mixed plates, a range of sandwiches like Shish Taouk, Beef Kabab, and Chicken Kabab, along with sides such as mixed salads and hummus. Specific items like Dolaimia, often served with okra or white beans stew, and their signature daqoos sauce are also featured.","socialMediaLinks":[""],"menuPdfUrl":"","reviewCount":0,"email":"","website":"https://machboos.ca/","photo":"/uploads/machboos-photo.webp","lat":0,"createdAt":"2026-04-17T00:22:52.278Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/machboos-photo.webp"],"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","cuisine":["Middle Eastern"],"openingHours":"","updatedAt":"2026-06-07T19:13:12.551Z","name":"Machboos"},{"id":"1nvJOesLEmYRAnyUjSOr","lat":0,"reviewCount":0,"email":"info@islamcare.ca","website":"https://www.islamcare.ca","menuPdfUrl":"","name":"Islam Care Centre","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","openingHours":"","cuisine":[],"updatedAt":"2026-05-23T15:20:09.414Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/islam-care-centre.webp"],"createdAt":"2026-05-16T10:12:20.689Z","lng":0,"category":["Organizations","Mosques","Schools"],"plan":"basic","phoneNumber":"613-565-3906","isFeatured":false,"address":"375 Somerset St W, Ottawa, ON K2P 0K2","averageRating":0,"socialMediaLinks":[""],"suburb":"Centretown","description":"The Islam Care Centre is a well-established non-profit organization located in Ottawa, Ontario. It is dedicated to supporting the Muslim community in Ottawa by providing resources for spiritual, social, and mental well-being. The center serves as a significant community hub, offering various programs and services to its members and the wider community.\n\nCore services include offering space for daily prayers and Jumu'ah (Friday congregational prayers), as well as providing Arabic and Quran classes for children and Islamic lectures for all ages. The centre is involved in extensive social outreach, which encompasses supporting newcomers to Canada, individuals experiencing homelessness, those new to Islam, former prisoners, women fleeing violence, and isolated seniors.\n\nFurthermore, the Islam Care Centre provides faith-based counseling and culturally sensitive support services, often in partnership with local organizations. It operates an on-site bookstore with Islamic books and gift items and contributes to public libraries with Islamic resources. The centre also organizes community events such as Iftars and Eid celebrations, and actively supports meal programs for the less fortunate.","menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"isApproved":true,"types":[],"slug":"islam-care-centre"},{"id":"1oAO8zTWB9jKQLiojiXi","isFeatured":false,"phoneNumber":"(613) 973-5000","plan":"basic","category":["Mosques"],"lng":-75.6972,"averageRating":0,"address":"351 Sandhill Rd, Kanata, ON K2K 3M5","description":"Kanata Muslim Association is a registered charity and community mosque serving the Kanata area and greater Ottawa West.\n\nEstablished in 2004 to support the growing Muslim population in the region, the association focuses on spiritual growth, education, outreach, and community well‑being.\n\nThe mosque hosts the five daily prayers and multiple Jum’ah prayer sessions each week, welcoming men, women, and children of all ages for worship and communal connection.\n\nBeyond prayer services, Kanata Muslim Association organizes a range of educational and social programs. These include Quran classes, youth activities, elder programs, and community events like art workshops and leadership clubs that engage families and individuals throughout the year.\n\nKMA also offers counselling support, zakat and financial assistance initiatives, and regular outreach efforts to assist those in need.\n\nAs part of its long‑term vision, the association is actively working on building a purpose‑built mosque and community centre designed to provide expanded space for worship, learning, wellness activities, and community services.","suburb":"Kanata","socialMediaLinks":[""],"slug":"kanata-muslim-association","types":[],"isApproved":true,"menuItems":[{"items":[{"price":"","description":"","name":""}],"category":""}],"lat":45.4215,"photo":"/uploads/kanata-muslim-association-photo.webp","menuPdfUrl":"","email":"info@kanatamuslims.ca","website":"https://kanatamuslims.ca/","reviewCount":0,"updatedAt":"2026-06-06T09:27:23.129Z","cuisine":[],"openingHours":"","submittedBy":"TlnotBahl2WlhBon7hvn0puRW193","name":"Kanata Muslim Association","createdAt":"2026-03-24T02:33:20.166Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/kanata-muslim-association-photo.webp"]},{"id":"1pQgE3by2YaphT2I7cAa","menuPdfUrl":"","reviewCount":0,"website":"https://damassupermarket. rb":"Carlington","description":"Maryam Super Market is a retail establishment offering a diverse selection of groceries and food products. It serves as a trusted destination for families and individuals seeking a variety of everyday staples and specialty items in the Ottawa area. The market aims to provide a comprehensive shopping experience for its patrons. \n\nThe supermarket features a wide array of fresh produce, pantry essentials, and international products, bringing diverse culinary ingredients to the community. A notable aspect of its offerings includes a specialization in halal meats, which are prepared in accordance with tradition. Beyond these essentials, Maryam Super Market also carries unique international items, spices, and grains that may be challenging to locate elsewhere in the city.\n\nBeyond its grocery selections, Maryam Super Market also offers a distinct prepared food service known as BBQ Maryam. This service provides a menu featuring a variety of Middle Eastern grilled items, such as BBQ Kafta Kabab, BBQ Shish Taouk, Iraqi Lamb Tikka, and Iraqi Shish Kabab. Other menu options include appetizers like Hummus, Baba Ghanoush, Garlic, and Sambousa, alongside traditional Injera Bread and various soft drinks.","address":"1234 Merivale Rd, Ottawa, ON K2C 4B8","averageRating":0,"plan":"basic","category":["Grocery","Restaurants"],"lng":0,"phoneNumber":"(613) 761-7777","isFeatured":false},{"id":"27JfBtCESkxxAuN60Nyc","address":"1668 Manotick Station Rd, Greely, ON K4P 1J8","averageRating":0,"phoneNumber":"(613) 851-7444","plan":"basic","category":["Organizations"],"lng":-75.6972,"isFeatured":false,"types":[],"menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"isApproved":true,"slug":"ottawa-muslim-cemetery","socialMediaLinks":[""],"description":"Ottawa Muslim Cemetery was established in 2008 to serve the Muslim community of Ottawa and surrounding areas by providing a dedicated, respectful burial space in accordance with Islamic traditions\n\nIt was created to provide a serene, respectful, and fully compliant Islamic burial site where families can carry out funeral rites according to Islamic traditions.\n\nThe cemetery offers a range of services, including burial plot sales, funeral prayer arrangements or Janazah, and guidance to families throughout the burial process.\n\nVisitors can access the cemetery grounds during seasonal visiting hours, and the office operates by appointment to assist with burial arrangements and inquiries.\n\nThe cemetery offers burial lots with flexible payment options, grave opening and closing services, and flat granite or bronze grave markers designed to honor Islamic customs.\n\nIt collaborates closely with local mosques to support families in funeral preparations, including washing, shrouding, and Janazah prayers.","suburb":"","website":"https://muslimcemetery.ca/","email":"nfo@muslimcemetery.ca","reviewCount":0,"menuPdfUrl":"","lat":45.4215,"photo":"/uploads/ottawa-muslim-cemetery-photo.webp","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/ottawa-muslim-cemetery-photo.webp"],"createdAt":"2026-03-25T13:25:57.975Z","name":" Ottawa Muslim Cemetery​","updatedAt":"2026-06-06T13:12:50.232Z","cuisine":[],"openingHours":"","submittedBy":"TlnotBahl2WlhBon7hvn0puRW193"},{"id":"2B9RmiR8lb3w5cYprWfq","createdAt":"2026-04-16T16:32:03.782Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/mezbaan-restaurant.webp"],"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-06-07T20:22:04.672Z","cuisine":["Afghani","Middle Eastern","Mediterranean"],"openingHours":"","name":"Mezbaan Restaurant","menuPdfUrl":"","email":"mezbaanrestaurantca@gmail.com","website":"https://mezbaan.restaurant/","reviewCount":0,"photo":"/uploads/mezbaan-restaurant-photo.webp","lat":0,"slug":"mezbaan-restaurant","isApproved":true,"menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"types":["Shawarma"],"suburb":"","description":"Mezbaan Restaurant offers an authentic Afghan culinary experience, dedicated to sharing the rich flavors and traditional hospitality of Afghanistan. The establishment is known for its fire-grilled meats, aromatic rice dishes, and a menu that reflects decades of culinary expertise and passion. It aims to provide a warm and welcoming atmosphere for all its guests.\n\nThe restaurant features a diverse menu that includes various kabob plates such as Shami Kabob, Chicken Breast Kabob, and Tikka Kabob, often served with fragrant rice, fresh salad, and homemade naan. Signature dishes include Qabuli Uzbeki, a lamb and rice specialty with caramelized carrots and raisins, and Mantu, steamed dumplings filled with seasoned ground beef and vegetables. Other popular choices include Half Chicken Tandoori and Chaplee Kabob.\n\nMezbaan Restaurant also offers a selection of flavorful wraps, prepared with fresh vegetables and savory sauces, ideal for a quick meal. The establishment provides dine-in, takeout, delivery, and catering services, aiming to bring Afghan traditions and exquisite meals to various events. Dessert options like Firnee are available to complete the dining experience.","socialMediaLinks":[""],"averageRating":0,"address":"3098 Carling Ave Unit 8, Nepean, ON K2H 7V7","isFeatured":false,"plan":"basic","lng":0,"category":["Restaurants"],"phoneNumber":"(613) 854-3500"},{"id":"2rUnwvLe0bLA4lEgDF8p","lat":0,"reviewCount":0,"website":"","email":"","menuPdfUrl":"","name":"Tawheed Bakery","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","openingHours":"","cuisine":["Middle Eastern"],"updatedAt":"2026-05-23T16:08:48.860Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/tawheed-bakery.webp"],"createdAt":"2026-05-15T01:51:14.214Z","category":["Restaurants"],"lng":0,"plan":"basic","phoneNumber":"613-747-7007","isFeatured":false,"address":"530 Montreal Road, Ottawa, ON K1K 0V1","averageRating":0,"socialMediaLinks":[""],"suburb":"Rideau-Rockcliffe","description":"Tawheed Bakery is a family-owned establishment in Ottawa, recognized for its authentic Middle Eastern and baked goods. It offers a diverse selection of freshly baked breads, alongside a variety of savory pastries filled with flavorful meats, cheeses, and fresh vegetables. The bakery is committed to using high-quality, fresh ingredients, aiming to deliver rich, time-honored flavors that celebrate cultural heritage and culinary tradition.\n\nBeyond its daily offerings, Tawheed Bakery also presents traditional sweet treats such as baklava and other regional delicacies. The establishment prides itself on providing a wide array of options, whether customers are seeking a quick snack, a hearty pastry, or a sweet indulgence.\n\nThe focus on authenticity and freshness has made Tawheed Bakery a beloved destination for those who appreciate Middle Eastern cuisine and quality baked goods. It serves as a local spot for a variety of traditional and culturally significant food items.","menuItems":[{"items":[{"name":"","description":"","price":""}],"category":""}],"isApproved":true,"types":["Bakery"],"slug":"tawheed-bakery"},{"id":"3HrLlW7OkFVY5ZXNgSi6","name":"Sultan Suleyman Turkish Cuisine","updatedAt":"2026-05-24T15:47:09.607Z","cuisine":["Turkish"],"openingHours":"","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/3hrllw7okfvy5zxngsi6-photos-0.webp"],"createdAt":"2026-04-16T17:07:11.101Z","lat":0,"photo":"/uploads/sultan-suleyman-turkish-cuisine-photo.webp","website":"https://sultansuleyman.ca","email":"","reviewCount":0,"menuPdfUrl":"","socialMediaLinks":[""],"description":"Sultan Suleyman Turkish Cuisine brings the rich flavors and traditions of Turkey to Ottawa, offering an authentic halal dining experience. The restaurant celebrates Turkish culinary heritage through a menu filled with timeless dishes and modern touches, crafted with care and passion. It aims to share its culture's food with the Canadian community, providing an immersive dining experience.\n\nGuests can begin their meal with a variety of cold and hot mezzes, such as creamy hummus, garlicky cacik (yogurt and cucumber dip), smoky saksuka (fried eggplant in tomato sauce), and the refreshing Shepherd's Salad (Çoban Salata). The menu also features a selection of traditional Turkish flatbreads, including Lahmacun and various Pide options like Sucuk & Cheese Pide and Thin Meat Flatbread (Etli Ekmek). Other popular items include Turkish Dumplings (Manti) topped with garlic yogurt and spices.\n\nFor main courses, Sultan Suleyman Turkish Cuisine showcases classic Turkish dishes such as tender Adana Kebab, juicy Chicken Shish, and beef doner. The restaurant also offers premium grilled meats, including beef tenderloin, slow-cooked beef ribs, lamb neck, and rack of lamb. Signature dishes like Ali Nazik, featuring lamb meat nestled in a roasted eggplant puree and garlicky yogurt, and the Sultan Suleyman Special Plate, which combines Adana Kebab, roasted eggplant, and mozzarella in lavash bread, are also available, representing their \"new-generation kebabs\" offerings.","suburb":"","types":["Shawarma"],"isApproved":true,"menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"slug":"sultan-suleyman-turkish-cuisine","phoneNumber":"613-680-6888","plan":"basic","lng":0,"category":["Restaurants"],"isFeatured":false,"address":"1679 Carling Ave, Ottawa, ON K2A 1C5","averageRating":0},{"id":"3TSM6GhH2SHod5ZmAkWM","socialMediaLinks":[""],"description":"Laheeb Elite is a halal Middle Eastern restaurant located in Ottawa, recognized for its authentic charcoal-grilled meats and shawarma offerings. The establishment prides itself on serving genuine recipes prepared over an open flame, providing a culinary experience that emphasizes fresh, high-quality, and 100% halal ingredients.\n\nThe menu at Laheeb Elite features a diverse selection of grilled items, including various skewers such as filet mignon, beef kabab, chicken kabab, and shish tawook. Popular choices extend to charcoal-grilled chicken and wings, as well as classic shawarma sandwiches and platters. Appetizers like hummus, baba ghanouj, stuffed grape leaves, and seasoned pilaf rice are also available to complement the main dishes.\n\nThe restaurant further distinguishes itself with weekend breakfast, lunch, and dinner buffets at its Elite location. These buffets showcase a rich array of traditional favorites, fresh mezze, comforting main courses, and a selection of desserts, providing an opportunity for guests to enjoy a comprehensive Middle Eastern dining experience. Family grill meals and family shawarma options are also part of their extensive offerings.","suburb":"Blossom Park","types":["Shawarma"],"isApproved":true,"menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"slug":"laheeb-elite","phoneNumber":"613-260-2626","plan":"basic","category":["Restaurants"],"lng":0,"isFeatured":false,"address":"2895 Bank St, Ottawa, ON K1T 1N6","averageRating":0,"name":"Laheeb Elite","updatedAt":"2026-06-08T01:56:17.543Z","cuisine":["Middle Eastern","Mediterranean"],"openingHours":"","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/laheeb-elite-photo.webp"],"createdAt":"2026-04-17T15:35:04.683Z","lat":0,"photo":"/uploads/laheeb-elite-photo.webp","website":"https://www.laheebrestaurants.ca/","email":"","reviewCount":0,"menuPdfUrl":""},{"id":"3kBvy98pqamuWcrYAx4v","photo":"/uploads/divan-turkish-cuisine-photo.webp","lat":45.4215,"website":"https://divanturkishcuisine.com","email":"divankanata@gmail.com","reviewCount":0,"menuPdfUrl":"","name":"Divan Turkish Cuisine","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","updatedAt":"2026-05-24T16:04:09.151Z","openingHours":"","cuisine":["Turkish"],"photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/divan-turkish-cuisine.webp"],"createdAt":"2026-04-12T03:49:43.454Z","plan":"basic","lng":-75.6972,"category":["Restaurants"],"phoneNumber":"613-271-9292","isFeatured":false,"address":"790 Kanata Ave., Ottawa, ON K2T 1E9","averageRating":0,"socialMediaLinks":[""],"suburb":"","description":"Divan Turkish Cuisine is a halal restaurant in Ottawa offering a wide range of traditional Turkish dishes, prepared with authentic ingredients and classic cooking techniques.\n\nThe menu reflects the richness of Turkish cuisine, combining charcoal-grilled meats, freshly baked breads, and a variety of hot and cold mezze.\n\nThe restaurant’s offerings include signature items such as döner kebab, Iskender kebab, Adana kebab, shish kebabs, and lamb chops, all typically served with rice or bulgur, fresh salads, and house-made bread.\n\nIn addition to grilled specialties, the menu features stone oven-baked dishes like pide and lahmacun, as well as wraps and sandwiches for lighter meals.\n\nDivan Turkish Cuisine also provides a variety of appetizers and sides, including hummus, baba ghanoush, ezme, and mixed mezze platters, along with soups such as traditional lentil soup.\n\nFor dessert, options like baklava, künefe, rice pudding, and trileçe are available, often paired with Turkish tea or coffee.","isApproved":true,"menuItems":[{"items":[{"description":"","price":"","name":""}],"category":""}],"types":["Shawarma"],"slug":"divan-turkish-cuisine"},{"id":"40ocNGZa71GMtvN4tbEg","menuPdfUrl":"","website":"https://sabayashack.com/","email":"","reviewCount":0,"lat":0,"photo":"/uploads/sabaya-shack-photo.webp","createdAt":"2026-04-16T17:09:50.971Z","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/sabaya-shack-photo.webp"],"updatedAt":"2026-06-07T20:10:26.047Z","openingHours":"","cuisine":["Middle Eastern"],"submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","name":"Sabaya Shack","averageRating":0,"address":"2285 St. Laurent Blvd, Ottawa, ON K1G 4Z7","isFeatured":false,"phoneNumber":"(613) 521-1988","plan":"basic","lng":0,"category":["Restaura
