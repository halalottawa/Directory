    <script>window.__INITIAL_ROUTE_TYPE__ = "listing"; window.__INITIAL_DATA__ = {"id":"3HrLlW7OkFVY5ZXNgSi6","name":"Sultan Suleyman Turkish Cuisine","updatedAt":"2026-05-24T15:47:09.607Z","cuisine":["Turkish"],"openingHours":"","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/3hrllw7okfvy5zxngsi6-photos-0.webp"],"createdAt":"2026-04-16T17:07:11.101Z","lat":0,"photo":"/uploads/sultan-suleyman-turkish-cuisine-photo.webp","website":"https://sultansuleyman.ca","email":"","reviewCount":0,"menuPdfUrl":"","socialMediaLinks":[""],"description":"Sultan Suleyman Turkish Cuisine brings the rich flavors and traditions of Turkey to Ottawa, offering an authentic halal dining experience. The restaurant celebrates Turkish culinary heritage through a menu filled with timeless dishes and modern touches, crafted with care and passion. It aims to share its culture's food with the Canadian community, providing an immersive dining experience.\n\nGuests can begin their meal with a variety of cold and hot mezzes, such as creamy hummus, garlicky cacik (yogurt and cucumber dip), smoky saksuka (fried eggplant in tomato sauce), and the refreshing Shepherd's Salad (Çoban Salata). The menu also features a selection of traditional Turkish flatbreads, including Lahmacun and various Pide options like Sucuk & Cheese Pide and Thin Meat Flatbread (Etli Ekmek). Other popular items include Turkish Dumplings (Manti) topped with garlic yogurt and spices.\n\nFor main courses, Sultan Suleyman Turkish Cuisine showcases classic Turkish dishes such as tender Adana Kebab, juicy Chicken Shish, and beef doner. The restaurant also offers premium grilled meats, including beef tenderloin, slow-cooked beef ribs, lamb neck, and rack of lamb. Signature dishes like Ali Nazik, featuring lamb meat nestled in a roasted eggplant puree and garlicky yogurt, and the Sultan Suleyman Special Plate, which combines Adana Kebab, roasted eggplant, and mozzarella in lavash bread, are also available, representing their \"new-generation kebabs\" offerings.","suburb":"","types":["Shawarma"],"isApproved":true,"menuItems":[{"items":[{"name":"","price":"","description":""}],"category":""}],"slug":"sultan-suleyman-turkish-cuisine","phoneNumber":"613-680-6888","plan":"basic","lng":0,"category":["Restaurants"],"isFeatured":false,"address":"1679 Carling Ave, Ottawa, ON K2A 1C5","averageRating":0};</script>
