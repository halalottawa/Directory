    <script>window.__INITIAL_ROUTE_TYPE__ = "listing"; window.__INITIAL_DATA__ = {"id":"idriss-mediterranean","description":"Idriss Mediterranean is an Ottawa-based restaurant dedicated to offering authentic Algerian cuisine. It provides a unique dining experience that blends tradition with warmth in a cozy, intimate 30-seat dining room. The restaurant is proudly family-run, with recipes lovingly handed down through generations, ensuring a taste of home-cooked tradition.\n\nThe menu at Idriss Mediterranean showcases the diverse culinary heritage of Algeria, emphasizing bold spices and time-honored techniques. Signature dishes include the Royal Couscous, a generous serving of fluffy couscous topped with tender lamb, chicken, and merguez sausage, and a variety of slow-cooked tajines such as Kafta Tajine with delectable meatballs and eggs, and Olive Tajine featuring chicken, green olives, and carrots.\n\nFurther offerings include traditional Rechta noodles, Mhajeb stuffed flatbread, and the Royal Grill which comprises marinated grilled chicken, lightly spicy beef merguez sausage, and kafta patties served with rice. Guests can also find appetizers like Ground Beef Bourak, a Mediterranean Salad, and traditional Algerian mint tea served with roasted peanuts and sesame halwa, alongside homemade desserts like baklava.","plan":"basic","types":["Shawarma"],"email":"","menuPdfUrl":"","updatedAt":"2026-06-01T01:38:14.763Z","address":"319 St Laurent Blvd, Ottawa, ON K1K 2Z5","submittedBy":"HGvOxV6NgjWBqCsKhNFaxIlpniZ2","createdAt":"2026-06-01T01:37:43.107Z","category":["Restaurants"],"cuisine":["Mediterranean","Middle Eastern"],"openingHours":"","phoneNumber":"613-744-8333","isApproved":true,"reviewCount":0,"isFeatured":false,"website":"idrissmediterranean.com","averageRating":0,"lng":0,"socialMediaLinks":[""],"photos":["https://pub-344de773fe4147898d363b9fffa2e2e4.r2.dev/uploads/idriss-mediterranean.webp"],"slug":"idriss-mediterranean","menuItems":[{"category":"","items":[{"nam
