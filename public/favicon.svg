  <!-- Outer subtle glowing border -->
  <rect x="20" y="20" width="472" height="472" rx="116" fill="none" stroke="#e90b35" stroke-opacity="0.15" stroke-width="8" />

  <!-- Beautiful crescent moon in brand red (#e90b35) -->
