name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build & Package Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Project Dependencies
        run: |
          npm ci
          # Install Capacitor core & platform CLI wrappers if not already present
          npm install @capacitor/core
          npm install -D @capacitor/cli @capacitor/android

      - name: Initialize Capacitor Config (Fallback if not created)
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "Halal Ottawa" "com.halalottawa.app" --web-dir=dist
          fi

      - name: Build Web Application
        run: npm run build
        env:
          VITE_APP_ENV: production
          # Add any client-side environment build flags here if required

      - name: Add Android Native Wrapper
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK & Gradle Cache
        uses: subosito/gleam-action@v2
        continue-on-error: true

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign APK (Targeting Android Sideload compatibility)
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        # Fallback to standard signed debug configuration if no custom production key is supplied in GitHub Secrets
        continue-on-error: true

      - name: Package & Suffix APK Artifacts
        run: |
          mkdir -p build-artifacts
          # Find compiled release/debug APKs and copy them safely
          find android/app/build/outputs/apk/ -name "*.apk" -exec cp {} build-artifacts/ \;
          mv build-artifacts/*release-unsigned.apk build-artifacts/halal-ottawa-release-unsigned.apk 2>/dev/null || true
          mv build-artifacts/*release.apk build-artifacts/halal-ottawa-signed-release.apk 2>/dev/null || true
          mv build-artifacts/*debug.apk build-artifacts/halal-ottawa-debug-debug.apk 2>/dev/null || true

      - name: Upload Clean Build to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Halal-Ottawa-Android-APKs
          path: build-artifacts/
          retention-days: 7
